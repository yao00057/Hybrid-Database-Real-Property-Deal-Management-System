server {
    listen 443 ssl;
    server_name cst8276.9nal.xyz;

    ssl_certificate /etc/letsencrypt/live/cst8276.9nal.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cst8276.9nal.xyz/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://backend:8001/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8001/openapi.json;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name cst8276.9nal.xyz;
    return 301 https://$host$request_uri;
}
